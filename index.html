<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" id="theme-color-meta" content="#ffffff" />
    <meta name="description" content="Excellent Susu — Community Savings & Collections Platform" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Excellent Susu" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="manifest" href="manifest.json" />
    <!-- Dark-mode flash prevention: runs synchronously before first paint -->
    <script>
      (function () {
        try {
          var dark = localStorage.getItem('excellent_susu_pref_darkMode') === 'true';
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.background = '#041C3F';
            var m = document.getElementById('theme-color-meta');
            if (m) m.setAttribute('content', '#041C3F');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Excellent Susu</title>
    <style>
      body { margin: 0; background: var(--background, #E8EDF8); }
      #root { min-height: 100vh; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script></body>
</html>
